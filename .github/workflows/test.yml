name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync deps (incl. dev group)
        run: uv sync --group dev --frozen

      - name: Run pytest
        run: uv run --group dev pytest tests/ -q
